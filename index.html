<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Guide - Object Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 10px; background: #222; }
        button { background: #007bff; color: white; border: none; padding: 15px 25px; margin: 10px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 80%; max-width: 300px; }
        #status { color: #ffc107; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>AI Assistive Guide</h1>
    <p id="status">Loading AI Model... Please wait...</p>

    <video id="videoFeed" autoplay playsinline muted></video>
    <br>
    <button onclick="startSystem()">Start Smart Guide</button>

    <script>
        let model = null;
        let video = document.getElementById('videoFeed');
        let statusText = document.getElementById('status');
        let lastSpoken = "";
        let lastSpokenTime = 0;

        // Load the AI model immediately when the page opens
        async function loadModel() {
            statusText.innerText = "Loading AI Model...";
            model = await cocoSsd.load();
            statusText.innerText = "AI Model Ready! Tap Start.";
            speakInstruction("System ready.");
        }
        loadModel();

        // Start Camera and begin scanning
        async function startSystem() {
            if (!model) {
                alert("Please wait for the model to load.");
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" },
                    audio: false 
                });
                video.srcObject = stream;
                statusText.innerText = "Scanning environment...";
                
                // Start the detection loop once the video plays
                video.addEventListener('loadeddata', () => {
                    detectFrame();
                });
            } catch (err) {
                alert("Error: " + err.message);
            }
        }

        // Continuous Detection Loop
        async function detectFrame() {
            if (!model) return;

            // Analyze current frame in RAM
            const predictions = await model.detect(video);
            
            if (predictions.length > 0) {
                // Focus on the top prediction
                const topPrediction = predictions[0];
                const objectName = topPrediction.class;
                const confidence = topPrediction.score;

                // Only announce if we are at least 60% sure
                if (confidence > 0.60) {
                    statusText.innerText = `Seeing: ${objectName} (${Math.round(confidence*100)}%)`;
                    
                    // Specific warning rules
                    let message = `Object ahead: ${objectName}`;
                    if (objectName === "cup" || objectName === "bottle") {
                        message = "Cup detected on your path.";
                    } else if (objectName === "chair" || objectName === "couch") {
                        message = "Obstacle ahead. Move slightly around.";
                    }

                    triggerVoiceWarning(message);
                }
            }
            
            // Request the next frame instantly
            requestAnimationFrame(detectFrame);
        }

        // Voice output management (Prevents the AI from repeating itself too fast)
        function triggerVoiceWarning(text) {
            const currentTime = Date.now();
            // Only speak if the message changed OR it has been 3 seconds since the last alert
            if (text !== lastSpoken || (currentTime - lastSpokenTime > 3000)) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    window.speechSynthesis.speak(utterance);
                    lastSpoken = text;
                    lastSpokenTime = currentTime;
                }
            }
        }

        function speakInstruction(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
