<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pop Up Admin</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  padding:20px;
}
.card{
  background:#1e1e1e;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
.approve{
  margin-top:10px;
  padding:10px;
  background:green;
  text-align:center;
  cursor:pointer;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>📋 POP UP APPLICATIONS</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getDatabase, ref, onValue, remove, set, update } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqJTLjxhZBCsvjrTH_cG0fkXlElG6BqTg",
  authDomain: "tose-ccf8f.firebaseapp.com",
  databaseURL: "https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tose-ccf8f",
  storageBucket: "tose-ccf8f.appspot.com",
  messagingSenderId: "475447495901",
  appId: "1:475447495901:web:9189276a162a3680afdf34"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

/* LOAD APPLICATIONS */
onValue(ref(db,"applications"), snap=>{
  const data = snap.val() || {};
  list.innerHTML="";

  Object.keys(data).forEach(uid=>{
    const r = data[uid];

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${r.name} ${r.surname}</b><br>
      📞 ${r.number}<br>
      🎂 ${r.age}<br>
      🔗 ${r.referral || "None"}<br>
      <small>${new Date(r.timestamp).toLocaleString()}</small>

      <div class="approve" onclick="approve('${uid}')">
        GRANT ✅
      </div>
    `;

    list.appendChild(div);
  });
});

/* APPROVE */
window.approve = async function(uid){

  const now = Date.now();

  const appRef = ref(db,"applications/"+uid);

  // GET DATA FIRST
  const snap = await fetchData(uid);
  const data = snap;

  // MOVE TO HISTORY
  await set(ref(db,"applicationsHistory/"+uid),{
    ...data,
    approvedAt: now
  });

  // SET USER APPROVED
  await update(ref(db,"users/"+uid),{
    approved:true
  });

  // REMOVE FROM PENDING
  await remove(appRef);

  alert("User Approved ✅");
};

async function fetchData(uid){
  const res = await fetch(`https://tose-ccf8f-default-rtdb.europe-west1.firebasedatabase.app/applications/${uid}.json`);
  return await res.json();
}

</script>

</body>
</html>
